name: BotVoice
options:
  bundleIdPrefix: ai.openclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "9YMCY74WN3"  # Xcode → Signing & Capabilities → Team

targets:
  BotVoice:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.johanneshahn.speakwithopenclaw
        INFOPLIST_FILE: Sources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "Speak with Claw"
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "Speak with Claw benötigt das Mikrofon, um deine Sprachnachrichten aufzunehmen und an deinen KI-Bot zu senden."
        NSSpeechRecognitionUsageDescription: "Speak with Claw nutzt die Spracherkennung, um auf dein eingestelltes Aktivierungswort zu reagieren."
        UIBackgroundModes:
          - audio
          - fetch
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies: []
